services:
  - type: web
    name: bitcoinlearn
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/bitcoinlearn-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 21.x
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: SPRING_APPLICATION_NAME
        value: bitcoinlearn