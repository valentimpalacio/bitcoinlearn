 <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${titulo} ?: 'BitcoinLearn'">BitcoinLearn</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>₿</text></svg>">
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b1421;color:#e0e6ed;min-height:100vh}
    nav{background:#111d2e;padding:1rem 1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;border-bottom:1px solid #1e3048}
    nav .logo{font-size:1.5rem;font-weight:700;color:#f7931a;text-decoration:none}
    nav a{color:#8a9bb5;text-decoration:none;font-size:.95rem;padding:.4rem .8rem;border-radius:6px;transition:.2s}
    nav a:hover{color:#f7931a;background:#16233a}
    nav a.active{color:#f7931a;background:#16233a}
    .container{max-width:1100px;margin:0 auto;padding:2rem 1rem}
    .card{background:#111d2e;border:1px solid #1e3048;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
    .card h2{color:#f7931a;margin-bottom:1rem;font-size:1.3rem}
    h1{font-size:2rem;margin-bottom:.5rem;color:#f0f4fa}
    .subtitle{color:#8a9bb5;margin-bottom:2rem;font-size:1.1rem}
    .btn{background:#f7931a;color:#0b1421;border:none;padding:.6rem 1.2rem;border-radius:8px;font-weight:600;cursor:pointer;font-size:.95rem;transition:.2s;text-decoration:none;display:inline-block}
    .btn:hover{background:#e08315;transform:translateY(-1px)}
    .btn-secondary{background:#1e3048;color:#e0e6ed}
    .btn-secondary:hover{background:#2a4060}
    .btn-sm{padding:.4rem .8rem;font-size:.85rem}
    .btn-danger{background:#dc3545;color:#fff}
    .btn-danger:hover{background:#c82333;transform:translateY(-1px)}
    input,select{background:#0b1421;border:1px solid #1e3048;color:#e0e6ed;padding:.6rem .8rem;border-radius:8px;font-size:.95rem;width:100%;margin-bottom:.8rem}
    input:focus,select:focus{outline:none;border-color:#f7931a}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
    @media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
    .text-center{text-align:center}
    .price-up{color:#4ade80}
    .price-down{color:#f87171}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:12px;font-size:.8rem;background:#1e3048;color:#8a9bb5}
    .badge.facil{background:#1a3a2a;color:#4ade80}
    .badge.medio{background:#3a3520;color:#fbbf24}
    .badge.dificil{background:#3a2020;color:#f87171}
    .option-btn{display:block;width:100%;text-align:left;background:#0b1421;border:1px solid #1e3048;color:#e0e6ed;padding:.8rem 1rem;border-radius:8px;cursor:pointer;transition:.2s;margin-bottom:.5rem;font-size:.95rem}
    .option-btn:hover{background:#16233a;border-color:#f7931a}
    .option-btn.correct{background:#1a3a2a;border-color:#4ade80}
    .option-btn.wrong{background:#3a2020;border-color:#f87171}
    .option-btn.disabled{cursor:default;opacity:.8}
    .stat-card{text-align:center;padding:1.5rem}
    .stat-card .value{font-size:2rem;font-weight:700;color:#f7931a}
    .stat-card .label{color:#8a9bb5;font-size:.85rem;margin-top:.3rem}
    .glossary-term{margin-bottom:.8rem}
    .glossary-term .term{color:#f7931a;font-weight:600;font-size:1.05rem}
    .glossary-term .def{color:#b0c0d4;margin-top:.2rem;line-height:1.5}
    .glossary-term .cat{display:inline-block;padding:.15rem .5rem;border-radius:10px;background:#16233a;color:#8a9bb5;font-size:.75rem;margin-top:.3rem}
    .price-big{font-size:2.2rem;font-weight:700;color:#f7931a}
    .price-sub{color:#8a9bb5;font-size:.9rem}
    .change{font-size:1rem;font-weight:500;margin-left:.5rem}
    .timer{font-size:1.2rem;font-weight:600;color:#f7931a;text-align:center}
    .question-counter{color:#8a9bb5;font-size:.9rem;margin-bottom:.5rem}
    .hide{display:none!important}
    .result-card{padding:2rem;text-align:center}
    .result-card .score{font-size:3rem;font-weight:700;color:#f7931a}
    .result-card .label{color:#8a9bb5;font-size:1rem;margin-top:.3rem}
    .transacao{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid #1e3048;font-size:.9rem}
    .transacao .tipo{font-weight:500}
    .transacao .tipo.compra{color:#4ade80}
    .transacao .tipo.venda{color:#f87171}
</style>
