<div th:fragment="preco" class="text-center" style="padding:.5rem 0">
    <span class="price-big" th:text="${'$' + #numbers.formatDecimal(priceUSD, 0, 'COMMA', 2, 'POINT')}">$0.00</span>
    <span class="price-sub" style="display:block">R$ <span th:text="${#numbers.formatDecimal(priceBRL, 0, 'COMMA', 2, 'POINT')}">0.00</span></span>
    <span class="change" th:classappend="${change24h >= 0} ? 'price-up' : 'price-down'" th:text="${change24h >= 0} ? '+' + #numbers.formatDecimal(change24h, 0, 'COMMA', 2, 'POINT') + '%' : #numbers.formatDecimal(change24h, 0, 'COMMA', 2, 'POINT') + '%'">0%</span>
    <span class="price-sub" style="display:block;font-size:.75rem;margin-top:.3rem">24h</span>
</div>
