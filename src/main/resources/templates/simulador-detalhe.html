<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"><meta charset="UTF-8"><title>Simulador - BitcoinLearn</title></head>
<body>
    <nav th:replace="~{fragments/nav :: nav}"></nav>
    <a href="/simulador" style="color:#8a9bb5;text-decoration:none;display:inline-block;margin-bottom:1rem">&larr; Voltar</a>

    <h1 th:text="${simulacao.nome}">Simulação</h1>

    <div th:if="${erro}" class="card" style="border-color:#f87171;background:#1a1a2e;text-align:center;padding:.75rem">
        <span style="color:#f87171" th:text="${erro}">Erro</span>
    </div>

    <div class="card">
        <div th:replace="~{fragments/preco :: preco}"></div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h2>Saldo</h2>
            <div style="font-size:2rem;font-weight:700;color:#4ade80" th:text="${'R$ ' + #numbers.formatDecimal(simulacao.saldoBRL, 0, 'COMMA', 2, 'POINT')}">R$ 0</div>
            <div style="color:#8a9bb5;font-size:.9rem">Disponível em reais</div>
            <div style="font-size:2rem;font-weight:700;color:#f7931a;margin-top:1rem" th:text="${#numbers.formatDecimal(simulacao.saldoBTC, 1, 'COMMA', 6, 'POINT') + ' BTC'}">0 BTC</div>
            <div style="color:#8a9bb5;font-size:.9rem">Em Bitcoin</div>
        </div>
        <div class="card">
            <h2>Valor Total</h2>
            <div style="font-size:2.5rem;font-weight:700;color:#f7931a" th:text="${'R$ ' + #numbers.formatDecimal(valorTotal, 0, 'COMMA', 2, 'POINT')}">R$ 0</div>
            <div style="color:#8a9bb5;font-size:.9rem">Saldo + Bitcoin a preço atual</div>
            <div style="margin-top:.5rem;font-size:.9rem">
                <span style="color:#8a9bb5">Lucro/Prejuízo: </span>
                <th:block th:with="lucro=${valorTotal - simulacao.saldoInicial}">
                    <span th:if="${lucro >= 0}" class="price-up" th:text="|R$ +${#numbers.formatDecimal(lucro, 1, 'COMMA', 2, 'POINT')}|"></span>
                    <span th:unless="${lucro >= 0}" class="price-down" th:text="|R$ ${#numbers.formatDecimal(lucro, 1, 'COMMA', 2, 'POINT')}|"></span>
                </th:block>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Negociar</h2>
        <div class="grid-2">
            <form th:action="@{'/simulador/' + ${simulacao.id} + '/comprar'}" method="post">
                <label style="color:#8a9bb5;font-size:.85rem">Comprar BTC (valor em R$)</label>
                <input type="number" name="valor" step="0.01" min="1" required>
                <button type="submit" class="btn">Comprar</button>
            </form>
            <form th:action="@{'/simulador/' + ${simulacao.id} + '/vender'}" method="post">
                <label style="color:#8a9bb5;font-size:.85rem">Vender BTC (quantidade)</label>
                <input type="number" name="quantidade" step="0.000001" min="0.000001" required>
                <button type="submit" class="btn btn-secondary">Vender</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h2>Histórico de Transações</h2>
            <button onclick="mostrarModal()" class="btn btn-sm btn-danger">Deletar Simulação</button>
        </div>

        <div id="modal-delete" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center" onclick="if(event.target===this)fecharModal()">
            <div style="background:#16213e;padding:2rem;border-radius:12px;max-width:360px;width:90%;text-align:center;border:1px solid #f87171">

                <h3 style="margin:0 0 .5rem;color:#fff">Excluir simulação?</h3>
                <p style="color:#8a9bb5;margin:0 0 1.5rem;font-size:.9rem">Esta ação não pode ser desfeita.</p>
                <div style="display:flex;gap:.75rem;justify-content:center">
                    <button onclick="fecharModal()" class="btn" style="min-width:100px">Cancelar</button>
                    <form th:action="@{'/simulador/' + ${simulacao.id} + '/deletar'}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-danger" style="min-width:100px;padding:.6rem 1.2rem">Excluir</button>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function mostrarModal(){document.getElementById('modal-delete').style.display='flex'}
            function fecharModal(){document.getElementById('modal-delete').style.display='none'}
        </script>
        <div th:if="${#lists.isEmpty(simulacao.transacoes)}" style="color:#8a9bb5;text-align:center;padding:1rem">
            Nenhuma transação realizada.
        </div>
        <div th:each="t : ${simulacao.transacoes}" class="transacao">
            <div>
                <span class="tipo" th:classappend="${t.tipo == 'COMPRA'} ? 'compra' : 'venda'" th:text="${t.tipo}">COMPRA</span>
                <span style="color:#8a9bb5;margin-left:.5rem" th:text="${#numbers.formatDecimal(t.quantidadeBTC, 1, 'COMMA', 6, 'POINT') + ' BTC'}">0 BTC</span>
            </div>
            <div style="text-align:right">
                <div th:text="${'R$ ' + #numbers.formatDecimal(t.valorBRL, 0, 'COMMA', 2, 'POINT')}">R$ 0</div>
                <small style="color:#8a9bb5" th:text="${'@ ' + #numbers.formatDecimal(t.precoBTC, 0, 'COMMA', 2, 'POINT')}">preco</small>
            </div>
        </div>
    </div>
</body>
</html>
