<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head"><meta charset="UTF-8"><title>Simulador - BitcoinLearn</title></head>
<body>
    <nav th:replace="fragments/nav :: nav"></nav>
    <h1>Simulador de Investimento</h1>
    <p class="subtitle">Simule compra e venda de Bitcoin com dinheiro ficticio e precos reais</p>

    <div class="card">
        <div th:replace="fragments/preco :: preco"></div>
    </div>

    <div class="card">
        <h2>Criar nova simulacao</h2>
        <form method="post" action="/simulador/criar" class="inline-flex" style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap">
            <div style="flex:1;min-width:150px">
                <label style="color:#8a9bb5;font-size:.85rem">Nome</label>
                <input type="text" name="nome" placeholder="Ex: Meu portfolio" required>
            </div>
            <div style="flex:1;min-width:150px">
                <label style="color:#8a9bb5;font-size:.85rem">Saldo inicial (R$)</label>
                <input type="number" name="saldo" value="10000" min="1" step="0.01" required>
            </div>
            <button type="submit" class="btn">Criar</button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(simulacoes)}">
        <div class="card text-center" style="padding:3rem">
            <p style="color:#8a9bb5;font-size:1.1rem">Nenhuma simulacao criada ainda.</p>
        </div>
    </div>

    <div th:each="s : ${simulacoes}" class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
            <div>
                <h2 style="margin:0" th:text="${s.nome}">Simulacao</h2>
                <small style="color:#8a9bb5" th:text="${'Criada em ' + #temporals.format(s.criadaEm, 'dd/MM/yyyy HH:mm')}">data</small>
            </div>
            <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
                <div class="text-center">
                    <div style="color:#4ade80;font-weight:700" th:text="${'R$ ' + #numbers.formatDecimal(s.saldoBRL, 0, 'COMMA', 2, 'POINT')}">R$ 0</div>
                    <small style="color:#8a9bb5">Disponivel</small>
                </div>
                <div class="text-center">
                    <div style="color:#f7931a;font-weight:700" th:text="${#numbers.formatDecimal(s.saldoBTC, 0, 'COMMA', 6, 'POINT') + ' BTC'}">0 BTC</div>
                    <small style="color:#8a9bb5">Em Bitcoin</small>
                </div>
                <a th:href="@{'/simulador/' + ${s.id}}" class="btn btn-sm">Detalhes</a>
            </div>
        </div>
    </div>
</body>
</html>
